<!DOCTYPE html><html lang="ar"><head><meta charset="UTF-8"><title>كيكة متحركة</title><style>body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#2b1f3d,#4a3466);overflow:hidden;font-family:sans-serif}.scene{position:relative;width:320px;height:340px}.cake{position:absolute;bottom:0;width:100%;animation:r 1s ease-out}@keyframes r{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}.plate{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:280px;height:20px;background:#ddd;border-radius:50%;box-shadow:0 6px 12px rgba(0,0,0,.4)}.layer{position:absolute;left:50%;transform:translateX(-50%);border-radius:10px}.lb{bottom:18px;width:240px;height:90px;background:linear-gradient(180deg,#d98b5f,#b5673e)}.lt{bottom:100px;width:170px;height:70px;background:linear-gradient(180deg,#e7a0c9,#d1699f)}.frosting{position:absolute;left:50%;transform:translateX(-50%);background:#fff5f8;border-radius:0 0 6px 6px}.fb{bottom:100px;width:250px;height:16px;border-radius:8px}.ft{bottom:162px;width:178px;height:14px;border-radius:8px}.drip{position:absolute;width:14px;height:22px;background:#fff5f8;border-radius:0 0 8px 8px}.sp{position:absolute;width:5px;height:10px;border-radius:2px}.candle{position:absolute;bottom:176px;left:50%;transform:translateX(-50%);width:8px;height:40px;background:repeating-linear-gradient(0deg,#f4d35e,#f4d35e 6px,#ee964b 6px,#ee964b 12px);border-radius:2px}.flame{position:absolute;bottom:214px;left:50%;transform:translateX(-50%);width:12px;height:20px;background:radial-gradient(ellipse at 50% 70%,#fff6d0,#ffcf4d 40%,#ff8a3d 75%,transparent);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;animation:f .9s ease-in-out infinite alternate;transform-origin:bottom center}@keyframes f{0%{transform:translateX(-50%) scale(1) rotate(-2deg);opacity:1}50%{transform:translateX(-50%) scale(1.08) rotate(2deg);opacity:.92}100%{transform:translateX(-50%) scale(.95) rotate(-1deg);opacity:1}}.glow{position:absolute;bottom:205px;left:50%;transform:translateX(-50%);width:60px;height:60px;background:radial-gradient(circle,rgba(255,200,90,.35),transparent 70%);animation:g .9s ease-in-out infinite alternate;pointer-events:none}@keyframes g{from{opacity:.5}to{opacity:1}}.confetti{position:absolute;top:-20px;width:6px;height:12px;opacity:.9;animation:d linear infinite}@keyframes d{0%{transform:translateY(0) rotate(0)}100%{transform:translateY(360px) rotate(360deg)}}.label{position:absolute;bottom:-34px;width:100%;text-align:center;color:#f4ecff;font-size:15px;letter-spacing:1px;opacity:0;animation:t 1s ease-out .9s forwards}@keyframes t{to{opacity:.85}}</style></head><body>
<div class="scene" id="s"><div class="cake"><div class="glow"></div><div class="candle"></div><div class="flame"></div><div class="ft frosting"></div><div class="lt layer"></div><div class="fb frosting"></div><div class="lb layer"></div><div class="plate"></div></div><div class="label">عيد ميلاد سعيد 🎂</div></div>
<script>const s=document.getElementById('s'),c=['#ff6b6b','#ffd93d','#6bcB77','#4dabf7','#c084fc','#ff9ff3'],k=s.querySelector('.cake');for(let i=0;i<18;i++){const e=document.createElement('div');e.className='sp';e.style.background=c[i%6];e.style.bottom=(i%2?168:106)+'px';e.style.left=(30+Math.random()*240)+'px';e.style.transform='rotate('+(Math.random()*60-30)+'deg)';k.appendChild(e)}for(let i=0;i<5;i++){const e=document.createElement('div');e.className='drip';e.style.bottom='84px';e.style.left=(60+i*40)+'px';k.appendChild(e)}for(let i=0;i<24;i++){const e=document.createElement('div');e.className='confetti';e.style.left=Math.random()*320+'px';e.style.background=c[i%6];e.style.animationDuration=(2+Math.random()*2)+'s';e.style.animationDelay=Math.random()*3+'s';s.appendChild(e)}</script>
</body></html>
